<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: transparent; width: 600px; height: 200px; overflow: hidden; }</style>
</head>
<body>
<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="50%" style="stop-color:#E8C98A"/>
      <stop offset="100%" style="stop-color:#A07840"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1408"/>
    </linearGradient>
  </defs>
  <rect width="600" height="200" rx="16" fill="url(#bg2)"/>
  <!-- Infinity / double loop mark -->
  <g transform="translate(75, 100)">
    <!-- Left loop -->
    <ellipse cx="-20" cy="0" rx="28" ry="20" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
    <!-- Right loop -->
    <ellipse cx="20" cy="0" rx="28" ry="20" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
    <!-- Center flash -->
    <circle cx="0" cy="0" r="4" fill="url(#gold)"/>
    <!-- Node dots -->
    <circle cx="-44" cy="0" r="3" fill="url(#gold)"/>
    <circle cx="44" cy="0" r="3" fill="url(#gold)"/>
    <circle cx="-20" cy="-20" r="2.5" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="2.5" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  </g>
  <!-- Divider -->
  <line x1="140" y1="45" x2="140" y2="155" stroke="#C9A96E" stroke-width="1" opacity="0.25"/>
  <!-- Wordmark -->
  <text x="162" y="87" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="38" letter-spacing="1" fill="white">AI Automation</text>
  <text x="162" y="120" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="38" letter-spacing="1" fill="url(#gold)">Studio</text>
  <!-- Thin underline -->
  <line x1="162" y1="130" x2="480" y2="130" stroke="url(#gold)" stroke-width="0.75" opacity="0.5"/>
  <!-- Dot accent top-right -->
  <circle cx="570" cy="40" r="3" fill="url(#gold)" opacity="0.7"/>
  <circle cx="582" cy="40" r="2" fill="url(#gold)" opacity="0.4"/>
  <circle cx="591" cy="40" r="1.5" fill="url(#gold)" opacity="0.2"/>
</svg>
</body>
</html>
